<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
  </defs>

  <!-- Fundo azul com cantos arredondados -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Cruz da farmácia — fundo branco -->
  <rect x="156" y="206" width="200" height="100" rx="18" fill="white"/>
  <rect x="206" y="156" width="100" height="200" rx="18" fill="white"/>

  <!-- Letra A centralizada na cruz -->
  <text x="256" y="275" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#1565c0" text-anchor="middle" dominant-baseline="middle">A</text>

  <!-- Texto Arcanjo embaixo -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" opacity="0.92">Arcanjo</text>
</svg>
